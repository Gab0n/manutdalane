<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Video Fullscreen</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      .video-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
      }

      .video-container video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .home-btn {
        position: fixed;
        bottom: 20px;
        left: 20px;
        padding: 12px 20px;
        background: transparent;
        color: #fff;
        text-decoration: none;
        border-radius: 8px;
        font-family: Arial, sans-serif;
        z-index: 999;
      }
    </style>
  </head>

  <body>
    <div class="video-container">
      <video id="myVideo" autoplay muted loop playsinline preload="auto">
        <source src="test.mp4" type="video/mp4" />

        Browser Anda tidak mendukung video HTML5.
      </video>
    </div>

    <a href="index.html" class="home-btn">Utama</a>
    <button id="soundBtn" onclick="toggleSound()">🔊</button>

    <style>
      #soundBtn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 9999;
        background: transparent;
        border: none;
        font-size: 26px;
        cursor: pointer;

        backdrop-filter: blur(5px);
      }

      #soundBtn:hover {
        opacity: 0.9;
      }
    </style>

    <script>
      function toggleSound() {
        const video = document.getElementById("myVideo");
        const btn = document.getElementById("soundBtn");

        if (video.muted) {
          video.muted = false;
          btn.innerHTML = "🔇";
        } else {
          video.muted = true;
          btn.innerHTML = "🔊";
        }
      }
    </script>
  </body>
</html>
